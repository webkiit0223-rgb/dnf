<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DNF 캐릭터 대시보드</title>
    <style>
        body { background-color: #121213; color: #fff; font-family: 'Malgun Gothic', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #character-list { width: 100%; max-width: 1100px; }

        .char-row { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            width: 100%;
        }

        .char-profile-card { 
            background: rgba(30, 30, 31, 0.8); padding: 20px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; 
            width: 240px; border: 1px solid #3a3a3a; cursor: pointer; transition: 0.3s;
            border-top: 4px solid #ffb822; box-sizing: border-box;
        }
        .char-profile-card:hover { transform: translateY(-5px); border-color: #ffb822; }
        .char-profile-card.active { border-color: #ffb822; background: rgba(45, 45, 47, 1); box-shadow: 0 0 15px rgba(255, 184, 34, 0.2); }
        
        .char-img-box { width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .char-img-box img { width: 100%; height: 100%; object-fit: contain; }
        .char-name { font-size: 20px; color: #ffb822; font-weight: bold; margin-top: 5px; }
        .char-server { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 4px; }

        .equipment-section { 
            display: none; 
            width: 100%; 
            border-top: 2px solid #333; 
            padding: 40px 0;
            margin-top: 10px;
            animation: fadeIn 0.4s ease-out; 
        }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; justify-content: center; }
        
        .item-card { background: #1e1e1f; border: 1px solid #4a4a4a; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .에픽 { border-color: #ffb822; }
        .레어 { border-color: #b388ff; }
        .태초 { border-color: #00ffcc; }
        
        /* [추가] 잠식 아이템 전용 보라색 테두리 (!important로 우선순위 높임) */
        .jamsik { border-color: #b388ff !important; box-shadow: inset 0 0 10px rgba(179, 136, 255, 0.3); }
        
        .slot-name { font-size: 11px; color: #888; margin-bottom: 8px; }
        .icon-box { width: 52px; height: 52px; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; border: 1px solid #3a3a3a; margin-bottom: 10px; }
        .icon-box img { width: 48px; height: 48px; }
        
        .item-name-box { font-size: 12px; color: #ccc; font-weight: bold; height: 34px; overflow: hidden; margin-bottom: 8px; line-height: 1.4; }
        .tuning-tag { color: #00ffcc; margin-left: 4px; font-weight: bold; font-size: 13px; }
        
        .upgrade-val { font-size: 14px; font-weight: bold; color: #ff69b4; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h2 style="color:#ffb822; margin-bottom: 40px; letter-spacing: 3px;">MY CHARACTERS</h2>

    <div id="character-list"></div>

    <script>
        let charDataStorage = {};

        function toggleEquip(name, element) {
            document.querySelectorAll('.equipment-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.char-profile-card').forEach(el => el.classList.remove('active'));

            const row = element.parentElement; 
            const section = row.querySelector('.equipment-section');
            const content = section.querySelector('.container');
            const title = section.querySelector('.row-title');

            element.classList.add('active');
            
            const char = charDataStorage[name];
            title.innerText = `${char.name} 장비 정보`;
            
            let itemHtml = '';
            char.items.forEach(item => {
                const romanMap = { "1": "Ⅰ", "2": "Ⅱ", "3": "Ⅲ" };
                const tuningRoman = romanMap[item.tuning] || "";
                const tuningSpan = tuningRoman ? `<span class="tuning-tag">${tuningRoman}</span>` : "";

                // 강화 수치 처리
                let displayUpgrade = item.upgrade;
                if (item.upgrade !== "-" && item.upgrade !== "0" && !String(item.upgrade).includes('+')) {
                    displayUpgrade = "+" + item.upgrade;
                }

                // [추가] "잠식 :" 포함 여부 체크
                const isJamsik = item.name.includes("잠식 :") ? "jamsik" : "";

                itemHtml += `
                    <div class="item-card ${item.rarity} ${isJamsik}">
                        <div class="slot-name">${item.slot}</div>
                        <div class="icon-box"><img src="${item.icon}" referrerpolicy="no-referrer"></div>
                        <div class="item-name-box">
                            ${item.name}${tuningSpan}
                        </div>
                        <div class="upgrade-val">${displayUpgrade}</div>
                    </div>
                `;
            });

            content.innerHTML = itemHtml;
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function handleResponse(response) {
            const rows = response.table.rows;
            if (!rows) return;
            
            rows.forEach(row => {
                const c = row.c;
                if (!c[0] || c[4].v === "부위") return;
                const charName = c[0].v;
                if (!charDataStorage[charName]) {
                    charDataStorage[charName] = { name: charName, server: c[1].v, img: c[8].v, items: [] };
                }
                charDataStorage[charName].items.push({
                    tuning: c[3] ? c[3].v : "0",
                    slot: c[4].v, 
                    name: c[5].v, 
                    icon: c[6].v, 
                    rarity: c[7].v, 
                    upgrade: c[9] ? c[9].v : "-"
                });
            });

            const listContainer = document.getElementById('character-list');
            const charNames = Object.keys(charDataStorage);
            
            for (let i = 0; i < charNames.length; i += 4) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'char-row';
                
                let cardsHtml = '';
                for (let j = i; j < i + 4 && j < charNames.length; j++) {
                    const char = charDataStorage[charNames[j]];
                    cardsHtml += `
                        <div class="char-profile-card" onclick="toggleEquip('${char.name}', this)">
                            <div class="char-img-box"><img src="${char.img}" referrerpolicy="no-referrer"></div>
                            <div class="char-name">${char.name}</div>
                            <div class="char-server">${char.server.toUpperCase()}</div>
                        </div>
                    `;
                }

                rowDiv.innerHTML = cardsHtml + `
                    <div class="equipment-section">
                        <h3 class="row-title" style="color:#ffb822; text-align:center; margin-bottom:30px; font-size:24px;"></h3>
                        <div class="container"></div>
                    </div>
                `;
                listContainer.appendChild(rowDiv);
            }
        }

        const sheetId = '1DggpiKsZCNrOJGfmcp9ey8Ks73N1af84qms4RU51D74';
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?range=A2:J&tqx=responseHandler:handleResponse`;
        document.body.appendChild(script);
    </script>
</body>
</html>
